### Blocked Round summary 변형 (★ v1.3.1)

capability=unavailable로 인해 라운드가 blocked인 경우 summary는 다음 추가 섹션을 포함:

```markdown
## 🛑 Round Blocked — Handoff Required

**Blocker stage**: 4_cix (phase 5+ entry)
**Blocker reason**: cross_model_baseline_unavailable
**Handoff artifact**: .cix/rounds/CIX-20260514-001/HANDOFF.md

### Completable in this environment
- ✅ 0_init, 1_sdx (skip), 2_tcx, 3_idx, 4_cix phase 1-4 (raw_seed_ideas.yaml)

### Requires external baseline LLM
- ❌ 4_cix phase 5+ (surprise_validation cross-model)
- ❌ 5_evx (dependent on 4_cix completion)
- ❌ 6_wrapup (dependent on 5_evx)

### Resume command (별도 환경에서)
    /cix innovate --resume-round=CIX-20260514-001 --from-phase=5_surprise_validation

이후 AOX는 resume run에서 .aox/{new_run_id}/0_init부터 시작하되,
sub_round_ids.cix_round_id를 기존 CIX-20260514-001로 설정 후 4_cix phase 5+ 부터 진행.
```

