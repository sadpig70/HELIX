## execution_plan.md 템플릿 (dry-run 산출물, v1.3.1)

```markdown
# AOX Execution Plan (Dry Run) — v1.3.1

**Mode**: dry-run
**AOX Version**: 1.3.1
**Estimated Total Duration**: ~15-20 minutes (duration은 부산물, 목표 KPI 아님)

## Environment Capability Probe (예상)
- cross_model_baseline_for_cix: <will be probed at Stage 0>
- 만약 unavailable → 라운드는 4_cix phase 4까지 수행 + handoff

## Pipeline

```
0_init (1s)
  + ★ AI_probe_environment_capabilities()
  ↓
1_sdx (conditional)
  ...
  ↓
2_tcx (~8 min)
  - G1-G8 (G8: cross_check_coverage 14/14)
  ↓
3_idx (~5 min)
  - layer 5/5/5/5 + layer_pure_assertion
  ↓
4_cix (~6 min)
  - Phase 1-4: 환경 무관 (raw_seed_ideas.yaml)
  - Phase 5+ capability gate:
      available  → 정상 수행 (cross-model baseline)
      degraded   → partial validation
      unavailable→ StageBlocked + HANDOFF.md + pipeline halt
  ↓
5_evx (~30s — deterministic)
  - dual winner (consensus + innovation)
  ↓
6_wrapup (~30s)
  - M1-M4 homogenization + 5 KPI 수집
```

## Resource Estimation

| Resource | Estimated |
|----------|-----------|
| AI calls | ~80 (cross-model baseline ~16 추가) |
| Tokens (input) | ~150,000 |
| Tokens (output) | ~80,000 |
| Duration (부산물) | ~15-20 minutes |
| Disk usage | ~5 MB |
| External API calls (★ v1.5) | cross-model baseline ~8-16 per CIX round |

## Risks

- Quality gate failures: auto-retry up to 2 times
- API rate limits: cross-model baseline 호출 제약 (capability=degraded 가능성)
- ★ capability=unavailable 시 round halt — fail이 아닌 blocked + handoff
- 비용 (token/$): 부산물로만 기록, *목표 KPI 아님*

## Continue?

To execute: `/aox full`
To modify: edit `aox_config.yaml`
```

