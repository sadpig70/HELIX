### 표준 blocker_reason 코드 (v1.3.1)

```yaml
cross_model_baseline_unavailable    # CIX phase 5+, surprise_validation 의무인데 다른 family LLM 호출 불가
cross_model_partial_capability      # 일부 페르소나만 baseline 가능 (quota/access 부분 제한)
pgf_personas_json_missing           # skills/pgf/discovery/personas.json 파일 접근 불가
upstream_round_missing              # 필요한 .{upstream}/latest/ 산출물 부재
sdx_catalog_orthogonality_breach    # SDX audit에서 직교성 임계 미달 — TCX 진입 불가
homogenization_trigger_unresolved   # 동질화 flag 활성 + SDX refresh 능력 없음
```

자유 텍스트 blocker_reason 금지. blocked 라운드는 위 표준 코드만 사용.

