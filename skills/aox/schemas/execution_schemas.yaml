## 호출 컨트랙트 (Subskill Interface, v1.3.1)

```yaml
subskill_contract:
  sdx:
    modes:
      bootstrap:
        inputs: {}
        outputs: {catalog_index: ".sdx/catalog/index.yaml", catalog_root: ".sdx/catalog"}
        timeout: 600s
      refresh:
        inputs: {previous_catalog_index: ".sdx/catalog/index.yaml"}
        outputs: {catalog_index: ".sdx/catalog/index.yaml", catalog_root: ".sdx/catalog"}
        timeout: 300s

  tcx:
    modes:
      full:
        inputs: {catalog_index: ".sdx/catalog/index.yaml"}
        outputs: {news: "md", industry_trend: "md", tcx_round_id: "TCX-{YYYYMMDD}-{NNN}"}
        timeout: 900s
        quality_gates: [G1, G2, G3, G4, G5, G6, G7, G8]
        # G8 = cross_check_coverage 14/14 (v1.5)

  idx:
    modes:
      distill:
        inputs: {industry_trend: "md"}
        outputs: {insight_layered_traced: "yaml", idx_round_id: "IDX-{YYYYMMDD}-{NNN}"}
        timeout: 600s

  cix:
    modes:
      innovate:
        inputs: {insight_layered_traced: "yaml"}
        outputs:
          idea_pool: "yaml"
          generation_log: "yaml"
          cix_round_id: "CIX-{YYYYMMDD}-{NNN}"        # ★ v1.3.1 — 명시 추적
        timeout: 900s
        # ★ v1.5.1 capability requirements
        capability_required:
          phase_1_to_4: ["file_io"]                    # raw_seeds까지는 환경 무관
          phase_5_plus: ["cross_model_baseline_for_cix"]  # surprise_validation 의무
        on_capability_unavailable:
          phase_5_plus: "StageBlocked + write HANDOFF.md + halt pipeline"
        # resume support
        resume_modes:
          - "--resume-round={cix_round_id} --from-phase=5_surprise_validation"
          # ★ 주의: --resume-round= 인자는 **CIX round_id** (NOT AOX run_id)

  evx:
    modes:
      evaluate:
        inputs:
          idea_pool:    ".cix/latest/idea_pool.yaml"
          cix_manifest: ".cix/latest/manifest.yaml"
          pgf_personas: "skills/pgf/discovery/personas.json"
        outputs:
          stage5_candidates: ".evx/latest/stage5_candidates.yaml"
          stage6_final:      ".evx/latest/stage6_final.yaml"
          final_idea:        ".evx/latest/final_idea.md"
          manifest:          ".evx/latest/manifest.yaml"
          evx_round_id:      "EVX-{YYYYMMDD}-{NNN}"     # ★ v1.3.1 — 명시 추적
        timeout: 120s
        quality_gates:
          - g1_input_top_k_present              # ideas == CIX top_k (24)
          - g2_all_personas_voted              # 모든 P1-P14 top-3 존재
          - g3_final_1_votes_min                # consensus_winner.votes ≥ 2
          - g4_assessment_counts                # 5S/3R/3X per winner
          - g5_axis_mapping_traceable           # manifest.policy.axis_mapping 4 formula
          - g6_dual_consistency                 # ★ v1.1: winners_identical=false면 양면 보고 의무
        backward_compat:
          - final_1 alias of consensus_winner
          - ranking_top_8 alias of consensus_ranking_top_8

contract_validation:
  - "각 호출 후 output 파일 존재 확인"
  - "YAML 스키마 자동 검증"
  - "타임아웃 초과 시 retry (max 2회)"
  - "재시도 시 이전 partial output은 archive로 이동"
  - "★ v1.2: EVX 검증은 .evx/latest/manifest.yaml의 quality 필드도 함께 확인"
  - "★ v1.3.1: sub-skill round_id를 status.sub_round_ids에 기록"
  - "★ v1.3.1: capability gate 통과 못한 stage는 status.stages[name]='blocked'로 표시"
  - "★ v1.3.1: blocked 시 blocker_reason은 표준 코드만 (자유 텍스트 금지)"
```

