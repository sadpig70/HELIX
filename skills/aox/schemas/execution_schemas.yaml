## Resume Command Disambiguation (★ v1.3.1)

CIX/IDX/TCX/EVX는 *자기 자신의 round_id*를 갖는다. AOX run_id와 별개다.

```
AOX run_id    : "a3f4-2026-05-14T05:00:00"           ← .aox/{run_id}/
CIX round_id  : "CIX-20260514-001"                    ← .cix/rounds/{round_id}/
IDX round_id  : "IDX-20260514-001"                    ← .idx/rounds/{round_id}/
TCX round_id  : "TCX-20260514-001"                    ← .tcx/rounds/{round_id}/
EVX round_id  : "EVX-20260514-001"                    ← .evx/rounds/{round_id}/
```

resume command 작성 시 *항상* sub-skill의 round_id를 사용:

```bash
# ✅ 올바름 — CIX round_id 사용
/cix innovate --resume-round=CIX-20260514-001 --from-phase=5_surprise_validation

# ❌ 잘못됨 — AOX run_id 사용
/cix innovate --resume-round=a3f4-2026-05-14T05:00:00 --from-phase=5
# (CIX는 이 ID를 모름 — 자기 .cix/rounds/ 디렉토리에 없음)
```

AOX는 status.sub_round_ids 매핑을 유지하여 resume command 생성 시 *반드시* sub-skill round_id를 사용한다. HANDOFF.md의 resume_command 필드도 동일.

```python
# AOX 내부 (Stage 4 blocked 처리 시)
handoff = AI_write_handoff_md(
    path=f".cix/rounds/{ctx.sub_round_ids['cix_round_id']}/HANDOFF.md",  # ★ CIX round_id
    resume_command=f"/cix innovate --resume-round={ctx.sub_round_ids['cix_round_id']} "
                  f"--from-phase=5_surprise_validation",                   # ★ CIX round_id
    ...
)
```
