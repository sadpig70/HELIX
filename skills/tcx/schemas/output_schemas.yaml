```

## quality_report.md contract

```yaml
quality_report:
  policy_ref: "TCX_POLICY.quality_gates_thresholds"
  thresholds_applied:
    G2_domain_coverage_floor: "{from policy}"
    G5_geographic_diversity_floor: "{from policy}"
    G5_format_shards_required: "{from policy}"
  gates:
    catalog_contract:        "pass | fail"
    domain_coverage:         "pass | fail"
    dimension_coverage:      "pass | fail"
    channel_attribution:     "pass | fail"
    sampling_diversity:      "pass | fail"
    no_user_personalization: "pass | fail"
    cross_domain_synthesis:  "pass | fail"
  failures:
    - {gate: "G5_sampling_diversity", reason: "geographic_cells_used=4 < floor=6"}
  retry_recommendation: "none | collect | analyze | full"
```

## .tcx/index.yaml contract (v1.4 — runtime rounds catalog)

```yaml
tcx_output:
  version: "v1.4"
  schema: "tcx.output_index.v1"
  generated_at: "ISO-8601"

  # ★ 고정 진입점 — IDX/AOX 등이 이걸 보고 최신 라운드 정보를 얻는다
  latest_round_id: "TCX-{YYYYMMDD}-{NNN}"
  latest_round_path: "rounds/TCX-{YYYYMMDD}-{NNN}"      # relative to .tcx/

  rounds:                                                # 최신 → 과거 순 (LIFO)
    - id: "TCX-20260513-005"
      path: "rounds/TCX-20260513-005"
      at: "ISO-8601"
      mode: "full | collect | analyze"
      quality: "passed | failed"
      catalog_v: "v1.3"
      catalog_policy_v: "v1.4"
      domain_set: "default_ideafirst_domains | custom_<hash>"
      channels_sampled: 36
      duration_sec: 124
    # ... older rounds

  archive_policy:
    retain_in_rounds_days: 90
    archive_target_pattern: "archive/{YYYY-Q[1-4]}/"
    archive_script: "{TCX_SKILL_DIR}/scripts/archive_rounds.py"
    last_archive_run: "ISO-8601 | never"
    rounds_in_archive: 0                                  # quick count
```

## .tcx/rounds/{round_id}/manifest.yaml contract (v1.5 — persona-aware reproducibility)

```yaml
round:
  id: "TCX-{YYYYMMDD}-{NNN}"
  generated_at: "ISO-8601"
  tcx_version: "1.5"
  mode: "full | collect | analyze"
  duration_sec: 124
  agent_runtime: "Claude Code Opus 4.7 + N sub-agents in W waves"

inputs:
  catalog:
    index_path: "{input.catalog_index}"
    version: "{catalog.version}"                   # e.g., v1.3
    policy_version: "{catalog.policy_version}"     # e.g., v1.4
    catalog_size: "{catalog.acceptance.catalog_size}"
    lock_eligible: "{catalog.acceptance.lock_eligible}"
    snapshot_hash: "sha256:..."                    # index.yaml 내용 해시
    shards_snapshot:                               # 카탈로그 변경 추적
      news: {path: "channels/news.yaml", count: 8}
      paper: {path: "channels/paper.yaml", count: 11}
      # ... full shard map at execution time

  domain_set:
    name: "default_ideafirst_domains | custom_<hash>"
    source: "default | --domains"
    version: "{domain_set.version}"
    count: "{len(domain_set.domains)}"
    domains: ["AI", "Quantum", "..."]              # 실행 시점의 도메인 목록
    domains_hash: "sha256:..."                     # domain list 해시 (재현성 검증용)

  personas:                                        # NEW v1.5 — PGF chain tracking
    source: "{PGF_SKILL_DIR}/discovery/personas.json"
    version_pin: "1.0"
    snapshot_hash: "sha256:..."                    # personas.json 내용 해시
    enabled_set: [P1, P2, P3, P4, P5, P6, P7, P8, P9, P10, P11, P12, P13, P14]
    parallelism: 4
    wave_count: 4

  policy:
    tcx_policy_snapshot: {sampling: {...}, collection: {...}, personas: {...},
                          persona_assignment: {...}, scoring: {...}, ...}
                                                   # 실행 시점의 TCX_POLICY 전체 복사

  cli_args: ["full", "--catalog=.sdx/catalog/index.yaml"]

execution:                                         # NEW v1.5
  wave_1_personas: [P1, P2, P3, P4]
  wave_2_personas: [P5, P6, P7, P8]
  trend_waves: ["TW1 (D01-D04)", "TW2 (D05-D08)", "TW3 (D09-D11)", "TW4 (D12-D14)"]
  total_subagents: 12
  synthesis_mode: "knowledge-based | live-scraped"  # W5 fix — provenance 명시

acceptance:
  catalog_validation_passed: true
  persona_assignment_valid: true                   # NEW v1.5 — all domains ≥2 persona
  all_quality_gates_passed: "true | false"
  failed_gates: []
  tension_flags_count: 0                           # NEW v1.5 — L7 input candidates
```

## .tcx/rounds/{round_id}/sampling_log.yaml contract (v1.5 — persona-aware debugging/replay)

```yaml
sampling:
  round_id: "TCX-{YYYYMMDD}-{NNN}"
  rng_seed: 1746789012                              # reproducible sampling
  total_pool: "{catalog.acceptance.catalog_size}"   # e.g., 80
  total_sampled: 36

  by_shard:                                         # 어떤 shard에서 몇 개 뽑았나
    news:   {pool_count: 8,  sampled_count: 5, sampled_ids: ["CH-0028", "CH-0029", ...]}
    paper:  {pool_count: 11, sampled_count: 6, sampled_ids: [...]}
    # ... all 10 shards

  by_axis:
    geographic_cells_used: ["CN", "JP_KR", "MENA", "AF", "LATAM", "IN_SEA", "US_EU"]  # 7/8
    temporal_cells_used:   ["T-0", "T-1Y", "T-5Y", "T-50Y", "T-100Y+"]                 # 5/5
    scale_cells_used:      ["macro", "meso", "micro"]                                  # 3/3

  by_domain:                                        # 각 도메인에 매칭된 채널 + 페르소나
    "AI & Machine Learning":
      matched_channels: ["CH-0035", "CH-0041", "CH-0017", "CH-0040", "CH-0042"]
      news_items_collected: 10
      personas_assigned: ["P5", "P8"]              # NEW v1.5 — cross-check pair
    "Quantum Technology":
      matched_channels: [...]
      news_items_collected: 10
      personas_assigned: ["P1", "P4"]
    # ... 14 domains

  # NEW v1.5 — PGF discovery 페르소나 assignment (재현성)
  persona_assignment:
    source: "{PGF_SKILL_DIR}/discovery/personas.json"
    version_pin: "1.0"
    strategy: "{TCX_POLICY.persona_assignment.strategy}"
    cross_check_min_per_domain: 2                   # G7-style 강제
    canonical_mapping_used: true                    # default 14-domain 일치 시 true

    by_persona:
      P1:
        name: "Disruptive Engineer"
        cognitive_style: "creative"
        domain_lens: "technology"
        time_horizon: "long"
        evaluation_bias: {novelty: 2.0, feasibility: 0.5, impact: 1.0, integrity: 1.0}
        assigned_domains: ["D02_Quantum", "D03_Robotics", "D05_Space"]
        assigned_channels: ["CH-0035", "CH-0075", "CH-0040", "CH-0017"]
        wave: 1
      # ... P2 ~ P8

  channel_assignment:                               # NEW v1.5 — channel ↔ persona affinity
    strategy: "shard_keyword_match"                 # persona.search_keywords + channel.shard
    assignments:
      "CH-0035":
        primary_persona: "P1"
        cross_check_persona: null
        rationale: "oss shard + persona.search_keywords['breakthrough', 'paradigm shift']"
      # ... per channel

  diversity_check:
    max_single_region_share: 0.31     # 최대 region 비중 (POLICY.diversity 0.40 하한 통과)
    max_single_format_share: 0.22     # 최대 format 비중 (POLICY.diversity 0.30 하한 통과)
    rebalance_iterations: 0           # 다양성 컷 위반 시 재샘플링 횟수
    persona_balance:                  # NEW v1.5 — 페르소나 load balance
      max_domains_per_persona: 4
      min_domains_per_persona: 2
      cross_check_coverage: "14/14"   # 모든 도메인 ≥2 persona 확인
```

