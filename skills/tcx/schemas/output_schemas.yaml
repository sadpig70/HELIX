# TCX Output Schemas v1.5
#
# v1.5 changes:
#   - news_item에 persona_id, cross_check_personas, persona_scores, tension_flag 필드 추가
#   - news.md metadata에 personas 블록 (PGF discovery 참조)
#   - sampling_log.yaml contract에 persona_assignment + channel_assignment 명시
#   - manifest.yaml contract에 personas chain (version_pin 추적)
#
# v1.3 changes (carried):
#   - shard counts dynamic (loaded from catalog.index.shards at runtime)
#   - axis enums reference SDX schemas/channel_entry.yaml#axis_system (no inline duplication)
#   - magic numbers reference TCX_POLICY

## news.md metadata contract

```yaml
news_collection:
  metadata:
    round_id: "TCX-{YYYYMMDD}-{NNN}"
    generated_at: "ISO-8601"
    tcx_version: "1.5"
    catalog:
      index_path: "{input.catalog_index}"
      root: "{derived from index_path.parent}"
      shard_key: "{catalog.shard_key}"           # from index.yaml (currently 'format')
      total_channels: "{catalog.acceptance.catalog_size}"   # dynamic
      version: "{catalog.version}"                # e.g., v1.3
      policy_version: "{catalog.policy_version}"  # e.g., v1.4
      lock_eligible: "{catalog.acceptance.lock_eligible}"
      shards_loaded: "{catalog.shards}"           # FULL OBJECT — paths + counts as found
    domain_set:
      name: "{domain_set.name}"                   # default_ideafirst_domains | custom_<hash>
      source: "default | --domains"
      count: "{len(domain_set.domains)}"
      domain_set_version: "{domain_set.version}"
    personas:                                     # NEW v1.5
      source: "{TCX_POLICY.personas.source}"      # {PGF_SKILL_DIR}/discovery/personas.json
      version_pin: "{TCX_POLICY.personas.version_pin}"   # e.g., "1.0"
      enabled_set: "{TCX_POLICY.personas.enabled_set}"   # [P1..P14]
      wave_count: "{TCX_POLICY.personas.wave_count}"
      parallelism: "{TCX_POLICY.personas.parallelism}"
      diversity_axes: "{TCX_POLICY.personas.diversity_axes}"  # [cognitive_style, domain_lens, time_horizon]
    sampling:
      policy_ref: "TCX_POLICY.sampling"
      channels_sampled: "{N}"
      format_shards_used: "{list_of_shard_names — all keys of catalog.shards in use}"
      geographic_cells_used: "{list — subset of axis_system.geographic}"
      temporal_cells_used:   "{list — subset of axis_system.temporal}"
      scale_cells_used:      "{list — subset of axis_system.scale}"
    quality:
      diversity_mode: true
      user_personalization_check: "passed | failed"
      cross_check_min_per_domain_met: true        # NEW v1.5 — all domains ≥2 personas
```

## news item contract

```yaml
domain:
  name: "{domain}"
  items:
    - title: "string"
      source_channel_id: "CH-NNNN"
      source_channel_name: "string"
      source_shard: "{any key from catalog.shards — dynamic, not enumerated here}"
      date: "YYYY-MM-DD | unknown"
      summary: "string"
      why_important: "string"
      axis_tags:
        # Enum values are NOT enumerated in this schema.
        # Source of truth: {sdx_skill_root}/schemas/channel_entry.yaml#axis_system
        # Validators must load that file at runtime and check each tag against the live enum.
        temporal:   "{any value from axis_system.temporal}"
        geographic: "{any value from axis_system.geographic}"
        format:     "{any value from axis_system.format}"
        scale:      "{any value from axis_system.scale}"

      # NEW v1.5 — PGF discovery 페르소나 추적 필드
      persona_id: "P1 | P2 | ... | P8"           # 본 item을 생성한 primary persona
      cross_check_personas: ["P{N}", ...]        # cross-check role 페르소나들 (보통 1개)
      persona_scores:                            # 각 페르소나의 evaluation_bias 적용 점수
        "{persona_id}":
          novelty: 0.0-10.0
          feasibility: 0.0-10.0
          impact: 0.0-10.0
          integrity: 0.0-10.0
          weighted_total: 0.0-10.0              # bias 가중합
      final_score: 0.0-10.0                     # mean across personas
      tension_flag: true | false                # cross-check disagreement > threshold (L7 input)
      provenance: "synthetic | observed"         # NEW v1.5 — W5 fix (synthesis mode 명시)
```

> **Why no inline enum?** SDX is the canonical source for the 4-Axis space.
> If SDX adds a new cell (e.g., format=`thesis`, geographic=`OCEANIA`), TCX accepts it
> automatically without code change. Hard-coded enums caused v1.2 to require manual
> sync after every SDX expansion.

## industry_trend.md contract

```yaml
industry_trend:
