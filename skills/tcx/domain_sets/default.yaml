# TCX Default Domain Set — default_ideafirst_domains
# Used when /tcx is invoked without --domains override.
# Designed to broadly cover SDX 4-Axis cell space (1,200 cells) with ~14 strategic domains.

domain_set:
  name: "default_ideafirst_domains"
  version: "v1.0"
  generated_at: "2026-05-13"
  count: 14
  selection_rationale: |
    IdeaFirst 8-AI 실증에서 3-cluster collapse를 일으킨 영역들을 명시적 cover하고,
    SDX 카탈로그의 비영미권 강화 채널(CN/JP_KR/AF/IN_SEA/LATAM/MENA/RU_EE)이
    의미 있게 활성화될 수 있도록 cross-regional·cross-format 활용도 높은 도메인 선정.
    각 도메인이 SDX의 ≥ 3개 format shard에서 신호를 받을 수 있어야 함.

  domains:
    - id: D01
      name: "AI & Machine Learning"
      keywords_en: ["AI", "machine learning", "LLM", "foundation models", "ML systems"]
      keywords_ko: ["인공지능", "머신러닝", "LLM"]
      expected_active_shards: [paper, conf, oss, niche, news, patent]

    - id: D02
      name: "Quantum Technology"
      keywords_en: ["quantum computing", "PQC", "post-quantum cryptography", "quantum sensing", "QKD"]
      keywords_ko: ["양자컴퓨팅", "양자기술", "PQC"]
      expected_active_shards: [paper, patent, std, gov, news]

    - id: D03
      name: "Robotics & Autonomous Systems"
      keywords_en: ["robotics", "humanoid", "autonomous", "embodied AI", "drone"]
      keywords_ko: ["로보틱스", "휴머노이드", "자율시스템"]
      expected_active_shards: [paper, patent, conf, oss, news]

    - id: D04
      name: "Synthetic Biology & Biotech"
      keywords_en: ["synthetic biology", "CRISPR", "gene editing", "biomanufacturing", "mRNA"]
      keywords_ko: ["합성생물학", "바이오테크", "유전자편집"]
      expected_active_shards: [paper, patent, gov, news, nature]

    - id: D05
      name: "Space & LEO"
      keywords_en: ["LEO", "low earth orbit", "space economy", "Mars", "satellite constellation"]
      keywords_ko: ["우주산업", "LEO", "위성"]
      expected_active_shards: [paper, gov, news, niche, vc]

    - id: D06
      name: "Energy Systems"
      keywords_en: ["renewable energy", "nuclear", "SMR", "battery storage", "grid", "fusion"]
      keywords_ko: ["에너지", "재생에너지", "원자력", "배터리"]
      expected_active_shards: [paper, patent, gov, news, nature]

    - id: D07
      name: "Semiconductors & Materials"
      keywords_en: ["semiconductor", "chip", "EUV", "lithography", "advanced materials", "2D materials"]
      keywords_ko: ["반도체", "소부장", "신소재"]
      expected_active_shards: [patent, paper, conf, news, std]

    - id: D08
