# ============================================================
# Cell coverage check (across 14 domains)
# ============================================================
expected_cell_coverage:
  format_shards_used:    ["paper", "patent", "std", "gov", "news", "conf", "oss", "niche", "nature", "vc"]   # 10/10
  geographic_diversity:  "all 8 cells should be touched across 14 domains (depends on catalog sampling)"
  rationale: |
    각 도메인의 expected_active_shards가 평균 5개. 14 domains × 5 shards = 70 domain-shard pairs.
    SDX 80 채널 카탈로그에서 골고루 샘플링되면 모든 format shard가 최소 1번 활성화됨 (G1 gate 충족).

# ============================================================
# Replacement policy
# ============================================================
override:
  cli_flag: "--domains=name1,name2,..."
  rule: "사용자가 --domains 제공 시 그 list가 정본. domain_set.name = 'custom_<hash>'로 기록."
  override_no_personalization: true   # 사용자 personalization 반영 금지 (G6 gate)
