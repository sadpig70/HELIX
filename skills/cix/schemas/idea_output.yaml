      lens_traceable: true                  # 2-stack 추적 가능
      existing_product_match: 0.08
      baseline_LLM_prediction_similarity: 0.19
      inter_agent_overlap: 0.12
      incumbent_benefit_only: false
      decision: "PASSED"
      caution: "규제 리스크 — 일부 국가에서 derivative 분류 불명확"

    surprise_validation_methods:
