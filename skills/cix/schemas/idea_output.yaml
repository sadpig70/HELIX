# CIX Seed Idea Output Schema v1.5.1
#
# v1.5.1 changes (per CIX SKILL.md v1.5.1, IdeaFirst + environment handling):
#   - manifest contract에 ★ environment 블록 (cross_model_capability 등)
#   - manifest.round.status = completed | blocked | partial
#   - manifest.round.blocker_reason — 표준 코드 enum
#   - manifest.round.handoff_required + handoff_to
#   - NEW section 6: HANDOFF.md contract
#   - weighted_total_formula_reference v1.5 (denominator 9.5)
#
# v1.5 changes (carried):
#   - scoring.weights: nov 1.0→1.5, def 1.0→0.5, surp 1.5→2.5, denom 8.5→9.5
#   - surprise_validation.fallback_acceptable: true → false
#   - baseline_control enforcement: soft → strict
#
# v1.3 changes (carried):
#   - PGF discovery 페르소나 (P1-P8) 정식 통합
#   - surprise_persona_results 페르소나 ID를 PGF P1-P8로 통일
#   - idea schema에 generated_by_persona / cross_check_persona / lens_assignment_persona 필드
#   - manifest contract에 personas chain (TCX → IDX → CIX 전체 chain)
#   - generation_log contract에 페르소나별 lens 사용·rejection·persona-purity audit
#
# v1.2 changes (carried):
#   - C9:  파일명 round-agnostic (idea_pool.yaml, _v1 제거)
#   - C10: rejection_check / baseline_comparison evidence를 IDX evidence v1.1 형식과
#          호환되도록 source_file/section/span/hash/confidence 보강
#   - C11: 4개 contract section 분리 (main / manifest / generation_log / .cix-index)
#   - C12: total_score 공식 — CIX_POLICY.scoring 참조 (single source of truth).
#   - C14: lens_application 필드 통일

# ============================================================
# 1. idea_pool.yaml — main artifact
# ============================================================

schema:
  required_fields:
    - id                       # IDEA-NNN
    - title                    # 짧은 시스템명
    - source_insight_id        # INS-L{N}-{NNN} (IDX 입력)
    - source_insight_layer     # L6_Gap | L7_Tension | L9_Counterfactual | L10_Generative
    - source_round_chain       # NEW v1.2 — IDX/TCX/SDX round chain (재현성)
    - lens_application         # primary_lens + lens_stack + transformation
    - system_description       # 시스템 묘사 (6-10줄)
    - stakeholders             # 행위자 리스트
    - domains                  # 결합 도메인 리스트
    - scores                   # 6축 평가 점수 (CIX_POLICY.scoring.axes)
    - total_score              # CIX_POLICY.scoring 적용
    - generated_by_persona     # PGF P1-P14 (primary; v1.3 P1-P8 → v1.6 P1-P14)
    - cross_check_persona      # PGF P1-P14 (cross-check; v1.3 P1-P8 → v1.6 P1-P14)
    - lens_assignment_persona  # NEW v1.3 — 어느 페르소나의 lens_group_affinity로 렌즈 할당됐나
    - rejection_check          # 자명 거부 필터 결과 + evidence v1.1
    - ready_for_ideafirst_mc_step_5 # bool

  optional_fields:
    - failure_modes
    - cross_domain_examples
    - surprise_persona_results
    - surprise_validation_methods   # v1.1 — applied validation methods (≥CIX_POLICY.surprise_validation.min_methods_required)
    - lens_assignment_log_ref       # v1.2 — link to generation_log.yaml entry
    - baseline_comparison           # v1.1 — baseline LLM 예측과의 유사도 (evidence v1.1 형식)
    - notes

  lens_application_schema:
    description: |
      v1.2 통일된 형식. single lens, stack 모두 동일 키 구조.
      stack의 경우 transformation 안에 step_1, step_2, ... 추가.
    required:
      - primary_lens          # 단일 적용 시 그 렌즈 / stack 시 첫 렌즈
      - lens_stack            # null (single) | [list of lens ids] (stack)
      - transformation:       # 변형 흔적 (lens_traceable)
          required:
            - original_problem    # 변형 전 인사이트 핵심 구조
            - lens_logic          # 렌즈가 적용한 논리
            - result              # 변형 결과 요약
          stack_extra:
            - step_1, step_2, ... # stack 단계별 중간 결과

  evidence_schema_v1_1:
    description: |
      v1.1 호환 — rejection_check / baseline_comparison 등에서 외부 출처 인용 시 사용.
      IDX evidence schema와 동일 (source_file/section/span/quote/quote_hash/confidence).
    required:
      - source_file
      - source_section
      - source_span        # [start, end]
      - quote
      - quote_hash         # sha256 — 위변조 검출
    optional:
      - confidence         # 0.0-1.0
      - contradictions

# ============================================================
# 2. 예시 아이디어 4개 (v1.2 — lens_application 키 통일 + evidence v1.1)
# ============================================================

example_ideas:

  # ---- From L6 Gap (IoT PQC) ----
  - id: "IDEA-001"
    title: "IoT PQC Insurance Pool"
    source_insight_id: "INS-L6-001"
    source_insight_layer: "L6_Gap"
    source_round_chain:
      cix: "CIX-20260513-001"
      idx: "IDX-20260513-001"
      tcx: "TCX-20260513-005"
      sdx_catalog: "v1.3"

    lens_application:
      primary_lens: "L7_FailureAsFeature"
      lens_stack: null
      transformation:
        original_problem: "IoT 디바이스는 PQC 마이그레이션 사실상 불가 (수명·비용·접근성)"
        lens_logic: "마이그레이션 불가성을 *문제*로 보지 않고 *보험 시장의 기반*으로 활용"
        result: "OEM이 디바이스 출하 시 PQC 침해 위험금 적립, 풀이 30년 보상"

    system_description: |
      IoT/임베디드 디바이스 PQC 침해 보험 풀.
      - 가입 OEM: 디바이스당 PQC 침해 위험금 적립 (출하가의 0.5-2%)
      - 30년 보장: 양자 침해 발생 시 OEM 대신 풀이 보상
      - 풀 운영자: 침해 모니터링 + cryptographic upgrade brokerage
      - 정부 인센티브: PQC 풀 가입 OEM에 조달 우대, 미가입 OEM은 시장 퇴출
      - 풀 자체가 PQC migration tool 산업의 대형 구매자로 작용
      - 침해 데이터 누적으로 보험료 정확도 시간에 따라 개선

    stakeholders:
      - "IoT/임베디드 OEM (가입자)"
      - "Insurance Pool Operator (운영자)"
      - "Government (인증·강제)"
      - "PQC Migration Tool Vendors (공급자)"
      - "End Users (간접 수혜)"

    domains: ["Cybersecurity", "Insurance", "IoT/Embedded", "Government Procurement"]

    scores:
      novelty: 8
      generativity: 9       # 의료기기/자동차SDV/스마트홈 등 파생
      defensibility: 8      # 규제 진입장벽 + 풀 효과
      compounding: 9        # 가입↑→데이터↑→가격정확도↑ 선순환
      surprise: 8           # 전문가 8명 중 5명 예측 실패
      coherence: 9
    total_score: 8.59
    # = (8 + 9*2 + 8 + 9*2 + 8*1.5 + 9) / 8.5
    # = (8 + 18 + 8 + 18 + 12 + 9) / 8.5
    # = 73 / 8.5 ≈ 8.588

    generated_by_persona: "P7"               # v1.3 — Contrarian Critic produced this idea
    cross_check_persona: "P3"                # v1.3 — Regulatory Architect cross-validated
    lens_assignment_persona: "P7"            # v1.3 — Group A Inversion (P1/P7 affinity)

    rejection_check:
      adjacent_market_saturated: false
      lens_traceable: true                  # L7 흔적 명확
      existing_product_match: 0.15
      baseline_LLM_prediction_similarity: 0.32
      inter_agent_overlap: 0.21
      incumbent_benefit_only: false
      decision: "PASSED"
      evidence:                              # v1.1 형식 — 어디서 0.15라는 수치가 나왔나
        - source_file: "raw_seed_ideas.yaml"
          source_section: "§existing_product_search.IDEA-001"
          source_span: [12048, 12298]
          quote: "Closest match: 'Quantum-Safe IoT firmware update service' (Cloudflare proposal, 2025) — similarity 0.15 (different mechanism, no insurance model)"
          quote_hash: "sha256:c1a3b5e7f9d2..."
          confidence: 0.93

    failure_modes:
      - "OEM이 적립 의무를 회피하기 위해 디바이스 분류를 IoT 외로 변경"
      - "양자 침해가 예상보다 빨라서 풀 자본 부족"
      - "한 국가만 가입 의무화 → 지역 규제 차익"

    cross_domain_examples:
      - "FDIC (예금자 보호 풀)"
      - "Nuclear power industry mutual liability pool"
      - "Lloyd's of London marine insurance"

    surprise_persona_results:                  # v1.6 — PGF P1-P14 (7-model × 2 baseline)
      P1_Disruptive_Engineer: predicted        # 보험 매커니즘이 paradigm shift라기엔 평이
      P2_Cold_eyed_Investor: predicted         # 매커니즘 익숙 (insurance pool은 잘 알려진 패턴)
      P3_Regulatory_Architect: NOT_predicted   # 규제로 푸는 발상 못 떠올림
      P4_Connecting_Scientist: NOT_predicted   # IoT ↔ insurance cross 못 봄
      P5_Field_Operator: NOT_predicted         # 구현 복잡도가 보임 vs 보험 단순화
      P6_Future_Sociologist: NOT_predicted     # 사회구조 변화 시각으로 못 봄
      P7_Contrarian_Critic: predicted          # failure mode (OEM 회피)는 익숙한 패턴
      P8_Convergence_Architect: NOT_predicted  # FinTech×IoT×Insurance 융합 못 떠올림
      P9_Practical_Agency_Ethicist: NOT_predicted    # 주체성·존엄 프레임으로 못 떠올림
      P10_Embodied_UX_Anthropologist: predicted      # 사용자 경험 관점은 익숙
      P11_Adversarial_Robustness_Analyst: NOT_predicted  # 공격·악용 프레임으로 못 봄
      P12_Regenerative_Systems_Ecologist: NOT_predicted  # 생태·자원 한계 시각으로 못 봄
      P13_Historical_Cycle_Analyst: predicted        # 보험은 역사적으로 흔한 전례
      P14_Mechanism_Designer: NOT_predicted          # 신규 인센티브 메커니즘 발명 관점
      surprise_score: 7                        # 9/14 not_predicted → bucket 7 (9-11/14)

    surprise_validation_methods:
      - cross_model                          # 4 페르소나는 GPT, 4는 Claude
      - temporal_separation                  # 다른 세션에서 격리 호출

    baseline_comparison:
      baseline_model: "GPT-4o (different from main Claude)"
      baseline_prediction_summary: "IoT firmware OTA service for PQC update"
      similarity: 0.32
      evidence:
        - source_file: "generation_log.yaml"
          source_section: "§baseline_comparison.IDEA-001"
          source_span: [4521, 4789]
          quote: "Baseline GPT-4o output proposes incremental firmware update mechanism, no insurance/pool structure detected"
          quote_hash: "sha256:d2b4c6e8a1f3..."
          confidence: 0.91

    ready_for_ideafirst_mc_step_5: true
    notes: |
      Compounding이 매우 강함 (시간↑ → 침해 데이터↑ → 가격 정확도↑).
      Layer 10 Generative와 결합 시 다른 영역(의료기기 PQC, 자동차 SDV PQC,
      스마트미터 PQC)으로 즉시 확장 가능.

  # ---- From L7 Tension (AI Data Sovereignty) ----
  - id: "IDEA-002"
    title: "Sovereign Embedding Exchange"
    source_insight_id: "INS-L7-001"
    source_insight_layer: "L7_Tension"
    source_round_chain:
      cix: "CIX-20260513-001"
      idx: "IDX-20260513-001"
      tcx: "TCX-20260513-005"
      sdx_catalog: "v1.3"

    lens_application:
      primary_lens: "L18_Atomization"
      lens_stack: null
      transformation:
        original_problem: "AI 학습 규모 요구 ↔ 데이터 주권 (양립 불가 모순)"
        lens_logic: "데이터를 통째로 이동시키지 말고 *임베딩 단위*로 atomize → 임베딩만 거래"
        result: "각국이 데이터는 보유, 임베딩만 추출해 교환하는 시장"

    system_description: |
      국경 간 AI 학습 데이터 교환 시장 (임베딩 단위).
      - 각국/조직: 데이터 원본은 자국 내 보유 (sovereignty 충족)
      - 임베딩 추출: 표준화된 임베딩 모델로 원본 → 고차원 벡터 추출
      - 거래소: 임베딩 묶음을 분류·검색·거래 (도메인·언어·시점 태그)
      - 구매자(AI lab): 임베딩을 직접 학습에 활용 (raw data 접근 불필요)
      - 임베딩 역추적 방지: 차등 프라이버시 + cryptographic mixing
      - 출처 입증: 임베딩에 zero-knowledge proof of origin

    stakeholders:
      - "데이터 보유국/기관 (sellers)"
      - "AI Foundation Model labs (buyers)"
      - "Embedding Exchange Operator"
      - "Regulators (sovereignty 보장)"
      - "Privacy Researchers (역추적 방지 검증)"

    domains: ["AI Infrastructure", "Data Markets", "Cryptography", "International Trade"]

    scores:
      novelty: 9
      generativity: 8
      defensibility: 9
      compounding: 8
      surprise: 9
      coherence: 8
    total_score: 8.41
    # = (9 + 8*2 + 9 + 8*2 + 9*1.5 + 8) / 8.5
    # = (9 + 16 + 9 + 16 + 13.5 + 8) / 8.5
    # = 71.5 / 8.5 ≈ 8.412

    generated_by_persona: "P2"               # v1.3 — Cold-eyed Investor (Atomization is a market move)
    cross_check_persona: "P3"                # v1.3 — Regulatory Architect (sovereignty 검증)
    lens_assignment_persona: "P2"            # v1.3 — Group D Composition (P2/P6 affinity)
    rejection_check:
      adjacent_market_saturated: false
      lens_traceable: true
      existing_product_match: 0.22
      baseline_LLM_prediction_similarity: 0.41
      inter_agent_overlap: 0.18
      incumbent_benefit_only: false
      decision: "PASSED"

    surprise_validation_methods:
      - cross_model
      - blind_baseline

    ready_for_ideafirst_mc_step_5: true

  # ---- From L9 Counterfactual (Pre-standard Humanoid OS) ----
  - id: "IDEA-003"
    title: "Standard Arbitrage Exchange"
    source_insight_id: "INS-L9-001"
    source_insight_layer: "L9_Counterfactual"
    source_round_chain:
      cix: "CIX-20260513-001"
      idx: "IDX-20260513-001"
      tcx: "TCX-20260513-005"
      sdx_catalog: "v1.3"

    lens_application:
      primary_lens: "L11_DomainTransplant"
      lens_stack: ["L11_DomainTransplant", "L3_CostInversion"]
      transformation:
        original_problem: "Pre-standard era에서 표준 결과 불확실성이 모두에게 비용"
        lens_logic: "Stack 2단계 — L11로 금융 derivatives 시장 구조 이식, L3로 불확실성을 비용에서 수익원으로 전환"
        result: "표준 미확정 분야의 'standard arbitrage' 파생상품 거래소"
        step_1: "L11: 휴머노이드 표준 미정 → 금융 derivatives 시장 구조 이식 (underlying = '특정 표준이 메이저가 될 것인가')"
        step_2: "L3: 표준화 비용 부담 → 표준화 *불확실성*이 *수익원*으로 전환 (Binary options, futures, swaps)"

    system_description: |
      Pre-standard 분야 (휴머노이드 OS, AI Agent Protocol 등)의 표준 결과를
      예측·거래하는 파생상품 거래소.
      - Underlying: "MCP가 2028년까지 메이저 AI Agent 통신 표준이 될 것인가" 등
      - 거래 상품: Binary options, futures, swaps
      - 정보 비대칭 활용: 산업 인사이더 vs 외부 투자자
      - 표준 결정 후 정산: 표준 단체 발표 또는 시장 점유율 임계치
      - 부수 가치: 거래 가격 = 시장 합의 예측 신호 → 표준화 가속 효과
