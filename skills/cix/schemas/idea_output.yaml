      - "Industry Insiders (정보 우위 거래자)"
      - "Hedge Funds (전문 거래)"
      - "Tech Companies (표준 보험)"
      - "Exchange Operator"

    domains: ["Financial Derivatives", "Standards Bodies", "Technology Forecasting"]

    scores:
      novelty: 10
      generativity: 7
      defensibility: 9
      compounding: 7
      surprise: 10
      coherence: 7
    total_score: 8.12
    # = (10 + 7*2 + 9 + 7*2 + 10*1.5 + 7) / 8.5
    # = (10 + 14 + 9 + 14 + 15 + 7) / 8.5
    # = 69 / 8.5 ≈ 8.118

    generated_by_persona: "P1"               # v1.3 — Disruptive Engineer (CF inversion 본질)
    cross_check_persona: "P8"                # v1.3 — Convergence Architect (cross-field 검증)
