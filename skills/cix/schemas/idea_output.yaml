      투자자 관점 평가 시 Feasibility 점수가 낮을 수 있음.

  # ---- From L10 Generative (Pre-standard Era) ----
  - id: "IDEA-004"
    title: "Compatibility-as-a-Service Mesh"
    source_insight_id: "INS-L10-001"
    source_insight_layer: "L10_Generative"
    source_round_chain:
      cix: "CIX-20260513-001"
      idx: "IDX-20260513-001"
      tcx: "TCX-20260513-005"
      sdx_catalog: "v1.3"

    lens_application:
      primary_lens: "L20_MultiLensStack"
      lens_stack: ["L11_DomainTransplant", "L19_Aggregation", "L13_FrequencyShift"]
      transformation:
        original_problem: "Pre-standard Era — 여러 사실표준 공존, 변환 비용 일회성"
        lens_logic: "Stack 3단계로 통역사 모델 이식 → 통합 mesh → 실시간 지속화"
        result: "사실표준 간 실시간 양방향 통역 mesh"
        step_1: "L11: '통역사' 직업 모델을 기술 시스템에 이식"
        step_2: "L19: 개별 변환을 통합 mesh 서비스로 묶음"
        step_3: "L13: 일회성 변환을 실시간 지속 서비스로 빈도 변경"

    system_description: |
      Pre-standard 분야의 여러 사실표준(de facto) 사이를 실시간 양방향
      변환하는 통합 mesh 서비스. "Pre-standard Era"의 핵심 인프라.
      - 대상: 휴머노이드 OS (Figure↔1X↔Tesla), AI Agent Protocol (MCP↔A2A↔ANP),
              바이오 데이터 (FHIR↔OMOP↔CDISC), 양자 SDK (Qiskit↔Cirq↔Q#)
      - 변환 엔진: 각 페어별 변환 로직 + 손실 측정 + 의미 보존 검증
      - 학습 효과: 변환 데이터 누적 → 변환 정확도 지수 개선
      - Pricing: 변환 호출당 / 월 무제한 / 변환 손실 보험
      - 거버넌스: 표준 변경 발생 시 자동 적응 (메이저 표준 v 업데이트 시)
      - 부수 효과: 표준 통일 압력 감소 → 다양성 유지에 기여

    stakeholders:
      - "Pre-standard 분야 기업 (사용자)"
      - "Standard Body (변환 로직 등록)"
      - "Mesh Operator"
      - "Quality Auditor (변환 정확도 검증)"

    domains: ["Standards", "API Infrastructure", "Multi-Domain"]

    scores:
      novelty: 8
      generativity: 10
      defensibility: 9
      compounding: 10
      surprise: 7
      coherence: 9
    total_score: 9.00
    # = (8 + 10*2 + 9 + 10*2 + 7*1.5 + 9) / 8.5
    # = (8 + 20 + 9 + 20 + 10.5 + 9) / 8.5
    # = 76.5 / 8.5 = 9.000

    generated_by_persona: "P8"               # v1.3 — Convergence Architect (L10 Generative 본질)
    cross_check_persona: "P4"                # v1.3 — Connecting Scientist (cross-domain 검증)
    lens_assignment_persona: "P8"            # v1.3 — Group B Shift + L20 stack (P1/P4/P8 affinity)

    rejection_check:
      adjacent_market_saturated: "low"      # API gateway 시장은 있지만 standard-arbitrage layer는 없음
      lens_traceable: true                  # 3-stack 모두 추적
      existing_product_match: 0.25
      baseline_LLM_prediction_similarity: 0.38
      inter_agent_overlap: 0.15
      incumbent_benefit_only: false
      decision: "PASSED"

    surprise_validation_methods:
      - cross_model
      - blind_baseline

    ready_for_ideafirst_mc_step_5: true
    notes: |
      Compounding과 Generativity 모두 만점. L10 Generative 인사이트가
      만든 아이디어답게 자체가 메타 인프라. IdeaFirst-MC STEP 7에서 최종 1개
      후보 강력 추천.

# ============================================================
# 3. 평가 메트릭 가이드 (참고용)
# ============================================================

metric_guide:
  novelty:
    10: "유사 제품 검색 0건, 특허 0건"
    7:  "부분적 유사 제품, 핵심 차별"
    4:  "여러 유사 제품 존재, 미세 차별"
    0:  "동일 제품 다수 존재"

  generativity:                # ⭐ CIX_POLICY.scoring.weights.generativity = 2.0
    10: "5개 이상 후속 아이디어 자동 도출"
    7:  "3-4개 후속"
    4:  "1-2개"
    0:  "닫힌 시스템, 파생 없음"
    measurement: "이 아이디어를 출발점으로 IDX L10 적용 가능성"

  defensibility:
    10: "네트워크 효과 + 데이터 누적 + 규제 진입장벽 모두"
    7:  "2개 해자"
    4:  "1개 해자"
    0:  "복제 즉시 가능"

  compounding:                 # ⭐ CIX_POLICY.scoring.weights.compounding = 2.0
    10: "지수적 가치 증가 (사용자/시간/데이터)"
    7:  "선형 + 약한 비선형"
    4:  "선형 증가"
    0:  "정적 가치"

  surprise:                    # ⭐ CIX_POLICY.scoring.weights.surprise = 1.5
    measurement: "14 전문가 페르소나 중 NOT_predicted 수 (cross-validation ≥CIX_POLICY.surprise_validation.min_methods_required)"
    10: "14/14"
    7:  "9-11/14"
    4:  "4-6/14"
    0:  "0-2/14"

  coherence:
    10: "구성·인과·시간 흐름 무모순"
    7:  "약한 모순 1-2개"
    0:  "내부 모순"

weighted_total_formula_reference: |
  # Reproduction only. Single source of truth: SKILL.md#CIX_POLICY.scoring
  # ★ v1.5 IdeaFirst — surprise/novelty 강화, defensibility 강등
  total = (novelty   * 1.5
         + generativity  * 2.0
         + defensibility * 0.5
         + compounding   * 2.0
         + surprise      * 2.5
         + coherence     * 1.0) / 9.5

  # 분모 9.5 = sum(weights). 이전 v1.4 분모 8.5 deprecated.
  # 최댓값: (15 + 20 + 5 + 20 + 25 + 10) / 9.5 = 95/9.5 = 10.0
  # surprise 가중치가 26.3%로 6축 중 1순위. defensibility 5.3%로 최하.

# ============================================================
# 4. manifest.yaml contract — round reproducibility (NEW v1.2)
# ============================================================

manifest_contract:
  description: |
    `.cix/rounds/{round_id}/manifest.yaml`. round 재현성을 위해 입력 IDX round,
    그 IDX의 source TCX round, SDX catalog version, CIX_POLICY 스냅샷, CLI args를 모두 기록.
    ★ v1.5.1 — environment capability + round.status 필드 추가.

  shape: |
    round:
      id: "CIX-{YYYYMMDD}-{NNN}"             # CIX 자체 round_id (NOT AOX run_id)
      generated_at: "ISO-8601"
      cix_version: "1.5.1"
      mode: "innovate | focus | filter"
      duration_sec: 312
      # ★ v1.5.1 신규 필드
      status: "completed | blocked | partial"   # round 종료 상태
      blocker_reason: null | "<표준 코드>"      # blocked일 때만. enum 아래 참조
      handoff_required: false | true            # blocked → true
      handoff_to: null | "human_or_orchestrator_with_external_api"
      handoff_artifact: null | ".cix/rounds/{round_id}/HANDOFF.md"
      phase_completed: null | "phase_4_raw_seeds" | "phase_5_validated" | ...
        # 부분 완료 시 어디까지 수행됐는지 명시

    # ★ v1.5.1 environment block (Codex 지적 반영)
    environment:
      probe_timestamp: "ISO-8601"
      main_model_class: "Claude | GPT | Gemini | Codex | ..."
      cross_model_capability: "available | unavailable | degraded"
      file_io: "available"
      pgf_personas_json_access: "available"
      baseline_models_attempted: []           # 사용한 baseline 모델 ID 리스트 (v1.5)
      baseline_model_id: null | "gpt-5"       # 주 baseline 모델 (cross-model 호출 시)
      baseline_call_session_hash: null | "sha256:..."

    inputs:
      source_root: ".idx/latest"
      idx_round:
        id: "IDX-{YYYYMMDD}-{NNN}"
        manifest_path: ".idx/latest/manifest.yaml"
        manifest_hash: "sha256:..."             # IDX manifest 해시 (변경 탐지)
        files_loaded:
          insight_layered_traced: {path: "insight_layered_traced.yaml", bytes: 38421, hash: "sha256:..."}
          insight_layered:        {path: "insight_layered.yaml",        bytes: 28104, hash: "sha256:..."}
          audit_report:           {path: "audit_report.md",             bytes:  3892, hash: "sha256:..."}
        audit_passed: true
        layer_distribution_in: {L6_Gap: 5, L7_Tension: 5, L9_Counterfactual: 5, L10_Generative: 5}

      tcx_round:                                 # via IDX manifest chain
        id: "TCX-{YYYYMMDD}-{NNN}"
        manifest_hash: "sha256:..."

      sdx_catalog:                               # via TCX manifest chain
        version: "v1.3"
        policy_version: "v1.4"
        catalog_size: 80
        lock_eligible: true

      policy:
        cix_policy_snapshot: {generation: {...}, rejection: {...}, scoring: {...},
                              surprise_validation: {...}, baseline_control: {...},
                              environment_requirements: {...},   # ★ v1.5.1
                              lens_distribution: {...}, storage: {...}}
        weights_v1_5: {nov: 1.5, gen: 2.0, def: 0.5, comp: 2.0, surp: 2.5, coh: 1.0, denom: 9.5}

      cli_args: ["innovate"]                     # or ["innovate", "--resume-round={cix_round_id}", "--from-phase=5"]
      random_seed: 1746789012

    execution:
      scoring_mode: "v1_5_cross_model"           # | "v1_5_partial" | "v1_5_blocked"
      # ★ v1.5.1: "deprecated_v1_5_heuristic" 사용 금지 — 발견 시 라운드 invalid
      cross_model_baseline_calls:
        attempted: 8
        succeeded: 8
        skipped: 0                               # degraded 시 일부 페르소나 skip
      personas_validated: ["P1", "P2", "P3", "P4", "P5", "P6", "P7", "P8"]
      personas_skipped: []

    acceptance:
      top_k_target_met: true                     # CIX_POLICY.scoring.top_k_to_ideafirst_mc
      lens_distribution_even: true               # 8 AI 균등 확인
      surprise_validation_methods_min_met: true  # 모든 idea ≥ min_methods_required
      baseline_control_isolation_met: true       # different model 사용 확인
      # ★ v1.5.1 신규
      environment_capability_check_passed: true  # Stage 0 probe 통과
      no_deprecated_heuristic_fallback: true     # scoring_mode != deprecated_v1_5_heuristic
      failed_validations: []

# ============================================================
# 4.1 Standard blocker_reason codes (★ NEW v1.5.1)
# ============================================================

blocker_reason_codes:
  description: |
    `manifest.round.blocker_reason` 필드는 다음 표준 코드만 허용. 자유 텍스트 금지.
    Auditor는 자유 텍스트 발견 시 HIGH severity issue로 보고.

  enum:
    cross_model_baseline_unavailable: |
      CIX phase 5+ surprise_validation은 cross_model baseline 의무인데
      현재 환경에서 다른 family LLM 호출 불가.
      → raw_seed_ideas.yaml까지만 보존 + HANDOFF.md 작성.
    cross_model_partial_capability: |
      일부 페르소나만 baseline 가능 (quota/access 부분 제한).
      → partial validation + 미검증 페르소나 surprise=0 보수 처리.
    pgf_personas_json_missing: |
      skills/pgf/discovery/personas.json 파일 접근 불가.
      → 모든 sub-skill 실행 불가 (CIX/IDX/TCX/EVX 공통 의존).
    upstream_round_missing: |
      필요한 .{upstream}/latest/ 산출물이 없음 (예: CIX인데 .idx/latest/ 빈 상태).
      → upstream 스킬 먼저 실행 또는 --insights= 명시.
    sdx_catalog_orthogonality_breach: |
      SDX audit에서 직교성 임계 미달. TCX 진입하면 입력 다양성 천장 깨짐.
      → /sdx refresh 선행.
    homogenization_trigger_unresolved: |
      .aox/global/homogenization_trigger.flag 활성 + 환경이 SDX refresh 능력 없음.
      → SDX refresh 가능한 환경에서 라운드 시작.

# ============================================================
# 4.2 HANDOFF.md contract (★ NEW v1.5.1)
# ============================================================

handoff_md_contract:
  description: |
    `.cix/rounds/{round_id}/HANDOFF.md`. blocked 라운드에서 다음 환경에 인계할 때 작성.
    blocked round의 *재개 명령*과 *필요 능력*을 명시. raw 산출물 path 보존.

  required_sections:
    blocker_context:
      template: |
        Stage {N} ({name}) blocked at phase {M}.
        Reason: {standard blocker_reason code}.
        Probe result: {environment.cross_model_capability 등 관련 capability 값}.
    required_capabilities:
      template: |
        다음 능력 갖춘 환경에서 resume:
          - cross_model_baseline_for_cix: available
          - 다른 family LLM: {main_model_class != baseline_model_class}
          - 예: main=Codex(GPT family) → baseline ∈ {Claude, Gemini-3, Grok}
    input_artifacts_preserved:
      template: |
        다음 산출물은 보존됨 — resume 시 재실행 불필요:
          - .cix/rounds/{round_id}/raw_seed_ideas.yaml ({N} raw seeds)
          - .cix/rounds/{round_id}/lens_assignment.yaml
          - .cix/rounds/{round_id}/manifest.yaml (policy_snapshot + environment)
    resume_command:
      template: |
        ★ 정확히 다음 명령을 사용 (CIX round_id, NOT AOX run_id):
          /cix innovate --resume-round={cix_round_id} --from-phase=5_surprise_validation
        주의: {cix_round_id}는 "CIX-YYYYMMDD-NNN" 형식. AOX run_id ("a3f4-...")를
        넘기면 CIX가 인식 못함.
    round_chain_provenance:
      template: |
        - source_idx_round: {from inputs.idx_round.id}
        - source_tcx_round: {from inputs.tcx_round.id}
        - sdx_catalog: {from inputs.sdx_catalog.version}

  optional_sections:
    estimated_remaining_cost: "외부 baseline 호출 추정 횟수 + 토큰 (참고용, KPI 아님)"
    parallel_resume_personas: "degraded 케이스에서 이미 validated 완료한 페르소나 목록"
    user_decision_required: "사용자 승인 필요 시점 명시 (예: 다른 모델 API 키 입력)"

  acceptance_criteria:
    - "모든 required_sections 채워짐"
    - "resume_command는 CIX round_id 사용 (AOX run_id 금지)"
    - "표준 blocker_reason 코드 인용 (자유 텍스트 금지)"

