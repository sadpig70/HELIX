    cross_domain_evidence:
      - domain: "Humanoid OS"
        observation: "Figure, 1X, GR00T, Tesla Optimus가 모두 독자 OS"
      - domain: "Quantum SDK"
        observation: "Qiskit, Cirq, Q#, Ocean이 모두 incompatible"
      - domain: "Bio Data Format"
        observation: "FHIR, OMOP, CDISC 동시 존재"
      - domain: "AI Agent Protocol"
        observation: "MCP, A2A, ANP 동시 등장"
      - domain: "Satellite ISL"
        observation: "Starlink, Kuiper, IRIS² 독자 ISL"
    abstraction_level: 3
    evidence:
      - source_file: "industry_trend.md"
        source_section: "§Robotics ↔ §Quantum ↔ §Healthcare ↔ §AI Infra ↔ §Space (cross)"
        source_span: [0, -1]
        quote: "(synthetic cross-section quote — derived from §multiple)"
        quote_hash: "sha256:00cross00cross..."
        confidence: 0.80
        contradictions: []
      - source_file: "context_layers.yaml"
        source_section: "L2_Pattern.recurring_patterns[Pre-standard Commercialization]"
        source_span: [1024, 1320]
        quote: "동일 시기에 5개 이상의 핵심 기술 영역에서 표준화 전 상용화가 관측됨..."
        quote_hash: "sha256:11pattern22aa..."
