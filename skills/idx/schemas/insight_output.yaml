# ============================================================
# 4. manifest.yaml contract — round reproducibility (NEW v1.2)
# ============================================================

manifest_contract:
  description: |
    `.idx/rounds/{round_id}/manifest.yaml`. round 재현성을 위해 입력 TCX round,
    SDX catalog version, IDX_POLICY 스냅샷, CLI args, PGF persona chain을 모두 기록.

  shape: |
    round:
      id: "IDX-{YYYYMMDD}-{NNN}"
      generated_at: "ISO-8601"
      idx_version: "1.2"
      mode: "distill | focus | audit"
      duration_sec: 245

    inputs:
      source_root: ".tcx/latest"
      tcx_round:
        id: "TCX-{YYYYMMDD}-{NNN}"             # source_tcx_round chain
        manifest_path: ".tcx/latest/manifest.yaml"
        manifest_hash: "sha256:..."             # TCX manifest 해시 (변경 탐지)
        files_loaded:
          industry_trend:  {path: "industry_trend.md",  bytes: 18234, hash: "sha256:..."}
          news:            {path: "news.md",            bytes: 22018, hash: "sha256:..."}
          quality_report:  {path: "quality_report.md",  bytes:  4521, hash: "sha256:..."}
        quality_gates_passed: true              # TCX quality_report 통과 여부

      sdx_catalog:                               # via TCX manifest chain
        version: "v1.3"
        policy_version: "v1.4"
        catalog_size: 80
        lock_eligible: true

      # NEW v1.3 — PGF persona chain (TCX 페르소나 추적)
      personas:
        source: "{PGF_SKILL_DIR}/discovery/personas.json"
        version_pin: "1.0"
        snapshot_hash: "sha256:..."             # personas.json 내용 해시
        enabled_set: [P1, P2, P3, P4, P5, P6, P7, P8, P9, P10, P11, P12, P13, P14]
        tcx_persona_chain:                       # TCX manifest에서 가져온 매핑
          source_tcx_round: "TCX-{YYYYMMDD}-{NNN}"
          tcx_assignment:                         # 어떤 페르소나가 어떤 도메인 담당했는지
            D01_AI: [P5, P8]
            # ... full mapping from TCX manifest

      domain_set:
        name: "default_ideafirst_domains"
        version: "v1.0"
        count: 14
        domains_hash: "sha256:..."

      policy:
        idx_policy_snapshot: {distillation: {...}, dedup: {...}, layer_metric_thresholds: {...},
                              layer_8_activation: {...}, storage: {...}}

      cli_args: ["distill"]

    acceptance:
      target_insights_total_met: true            # 20개 산출
      layer_distribution_met:                    # 각 layer = 5
        L6_Gap: 5
        L7_Tension: 5
        L9_Counterfactual: 5
        L10_Generative: 5
      all_metric_thresholds_passed: true
      failed_validations: []

# ============================================================
# 5. distillation_log.yaml contract — agent-level debugging (NEW v1.2)
# ============================================================

distillation_log_contract:
  description: |
    `.idx/rounds/{round_id}/distillation_log.yaml`. PGF P1-P14 각각이
    어떤 Layer에서 몇 개의 candidate를 만들고 몇 개가 dedup/threshold로 잘렸는지 기록.
    Audit mode + 사후 디버깅 + persona-purity 검증 핵심.

  shape: |
    distillation:
      round_id: "IDX-{YYYYMMDD}-{NNN}"
      total_candidates: 47                       # 14 페르소나 합산
      total_after_dedup: 20

      per_persona:                              # PGF P1-P14 (구 AI_1~AI_8 → v1.3 P1-P8 → v1.6 P1-P14)
        P3:
          name: "Regulatory Architect"
          assigned_layer: "L6_Gap"
          role: "primary"
          evaluation_bias: {integrity: 2.0, impact: 1.0, novelty: 0.5, feasibility: 1.0}
          candidates_generated: 6
          accepted_after_thresholds: 4
          rejected:
            - {id: "tmp-l6-005", reason: "non_obviousness=4 < 6 threshold"}
            - {id: "tmp-l6-006", reason: "missing what_is_missing field"}
          final_in_output: 3
          persona_purity:                       # NEW v1.3
            keywords_matched: ["governance gap", "regulatory void", "jurisdictional"]
            tone_consistency: 0.92             # 0-1, persona system_prompt 일치도
        P7:
          name: "Contrarian Critic"
          assigned_layer: "L6_Gap"
          role: "cross_check"
          evaluation_bias: {integrity: 2.0, feasibility: 1.5, novelty: 0.3, impact: 0.5}
          candidates_generated: 5
          accepted_after_thresholds: 4
          final_in_output: 2                     # P3와 중복된 1개 dedup됨
          persona_purity:
            keywords_matched: ["hidden assumption", "historical failure analog"]
            tone_consistency: 0.89
        # ... P1, P2, P4, P5, P6, P8 (각자의 Layer 담당)

      dedup_stats:
        same_layer_collisions: 4                 # within-layer dedup 발생 횟수
        cross_layer_collisions: 1                # cross-layer 발생 횟수
        embeddings_model: "(implementation-defined)"

      layer_metric_pass_rates:
        L6_Gap: 0.83                             # 6/(6+1) 등
        L7_Tension: 0.75
        L9_Counterfactual: 0.71
        L10_Generative: 0.66

      l8_activation:
        evaluated: true
        activated: false
        skip_reason: "temporal_span_years=2 < 3 required"

# ============================================================
# 6. .idx/index.yaml contract — runtime rounds catalog (NEW v1.2)
# ============================================================

idx_index_contract:
  description: |
    `.idx/index.yaml`. 모든 IDX round의 메타데이터 + 최신 round 포인터.
    CIX 등 downstream이 latest_round_id로 추적.

  shape: |
    idx_output:
      version: "v1.2"
      schema: "idx.output_index.v1"
      generated_at: "ISO-8601"

      # ★ 고정 진입점 — CIX 등이 이걸 보고 최신 IDX round 정보를 얻는다
      latest_round_id: "IDX-{YYYYMMDD}-{NNN}"
      latest_round_path: "rounds/IDX-{YYYYMMDD}-{NNN}"      # relative to .idx/

      rounds:                                                # 최신 → 과거 순 (LIFO)
        - id: "IDX-20260513-001"
          path: "rounds/IDX-20260513-001"
          at: "ISO-8601"
          mode: "distill | focus | audit"
          quality: "passed | failed"
          source_tcx_round: "TCX-20260513-005"
          tcx_manifest_hash: "sha256:..."                    # TCX 변경 추적
          insights_total: 20
          layer_distribution: {L6_Gap: 5, L7_Tension: 5, L9_Counterfactual: 5, L10_Generative: 5}
          duration_sec: 245
        # ... older rounds

      archive_policy:
        retain_in_rounds_days: 90
        archive_target_pattern: "archive/{YYYY-Q[1-4]}/"
        archive_script: "{IDX_SKILL_DIR}/scripts/archive_rounds.py"
        last_archive_run: "ISO-8601 | never"
        rounds_in_archive: 0

