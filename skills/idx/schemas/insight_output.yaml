    metrics:
      seeds_yielded: 5
      depth_of_implication: 9
      evidence_grounded: 9
      specificity: 8
      cross_layer_independence: 10
    total_score: 9.20
    generated_by: ["AI_7", "AI_8"]
    source_round: "IDX-20260513-001"
