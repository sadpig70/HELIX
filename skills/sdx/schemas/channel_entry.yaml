# ==========================================
# 8축 메트릭 가이드 (0-10 점수)
# ==========================================

metric_guide:
  independence:
    desc: "기존 카탈로그 채널과의 직교성"
    measurement: "max(overlap with existing) → 10 - (10 × max_ov)"
    weight: 2.0  # 가중치 2배

  signal_density:
    desc: "잡음 대비 정보율"
    high_10: "1차 자료, 전문가 큐레이션"
    mid_5: "혼재된 정보"
    low_0: "광고/스팸/SEO 콘텐츠 다수"

  persistence:
    desc: "지속 갱신 vs 일회성"
    high_10: "정기 갱신, archive 보존 정책 있음"
    low_0: "도메인 만료 위험, 단발 프로젝트"

  accessibility:
    desc: "접근 비용"
    10: "공개 API + 무료"
    7: "무료 가입 필요"
    4: "유료 구독"
    1: "기관 계약 필요"

  geo_diversity:
    desc: "영미권 외 정도"
    10: "비영미권 전용"
    5: "혼합"
    0: "영미권 only"

  temporal_depth:
    desc: "과거 도달 깊이"
    10: "100년+ 아카이브"
    7: "30년+"
    4: "10년+"
    1: "최근 1년"

  format_unique:
    desc: "다른 채널과 포맷 차이"
    10: "독특한 포맷 (e.g., FOIA 공개문서)"
    5: "흔한 포맷"
    0: "표준 RSS, 흔한 뉴스"

  trust_level:
    desc: "1차 자료성"
    10: "1차 자료 (정부 발간, 학회 원본)"
    7: "검증된 2차 자료"
    4: "비검증 2차"
    0: "허위·왜곡 가능성"

# ==========================================
# 채널 노화 가이드 (v1.3 — 정본: SKILL.md AI_score_channel_freshness)
# ==========================================
#
# 8축 metrics는 *발굴 시점* 정적 평가. decay_guide는 *시간에 따른 동적* 신선도.
# 둘은 상보적: metrics=품질, freshness=노화. weak 판정은 둘 다 본다.

decay_guide:
  freshness:
    desc: "미산출 지속 + validated_at 노화에 따른 지수 감쇠 신선도 (0-10)"
    formula: |
      rounds_since_yield = current_round - (last_yield_round or first_seen_round)
      base = 10 × 0.5 ^ (rounds_since_yield / channel_decay.half_life_rounds)
      freshness = clamp(base × (0.7 if validated_at 노화초과 else 1.0), 0, 10)
    policy_ref: "SKILL.md SDX_POLICY.channel_decay (half_life_rounds / stale_validated_days / freshness_floor)"
    rationale: "homogenization은 출력 동질화라는 *지연·시스템* 신호. freshness는 채널별 *선행* 신호."

  orthogonality_drift:
    desc: "현재 카탈로그 대비 이 채널의 max pairwise overlap (0-1)"
    measurement: "max(AI_compute_pairwise_overlap(this, other) for other in catalog)"
    weak_when: "> SDX_POLICY.selection.max_overlap_cut (0.5) — 발굴 후 상관이 누적된 신호"
    updated_by: "DriftGuard(라운드별 표본) 및 ModeAudit(전수 N×N)"

  catalog_size_note: |
    카탈로그 80은 설계된 *직교 기저 차원*(고정)이지 비용 변수가 아니다.
    노화 채널은 '축소'가 아니라 ModeRefresh의 *교체*(크기 보존)로 처리한다.
    상향 확장만 ModeExpand로 허용. (cost≪가치: 비용절감용 축소 = non-goal)

  yield_attribution:
    desc: "last_yield_round / yield_count 를 채우는 출처 (v1.3 — 수기 아님)"
    source: |
      라운드 종료 시 SDX AI_record_channel_yield 가 기록. 기여 채널은
      provenance walk 로 산출: EVX winner → CIX idea.source_insight_id
      → IDX insight.source_tcx_items → TCX item.source_channel_id → CH-NNNN.
      전부 *기존* 필드 — TCX/IDX/CIX/EVX 스키마 변경 불요.
    yield_log: ".sdx/catalog/yield_log.jsonl (SDX 소유, append-only, 라운드당 1 레코드)"
    policy_ref: "SKILL.md SDX_POLICY.yield_attribution (credit_scope / fallback)"
    first_seen_round: |
      신규 채널 등재(ModeBootstrap/Refresh/Expand emit) 시 반드시 설정 —
      freshness anchor 폴백(아직 yield 없는 신선한 채널이 즉시 weak로 오인되지 않도록).

# ==========================================
# 4-Axis 셀 좌표 시스템
# ==========================================

axis_system:
  temporal:
    - T-0
    - T-1Y
    - T-5Y
    - T-50Y
    - T-100Y+
  
  geographic:
    - US_EU
    - CN
    - RU_EE
    - IN_SEA
    - JP_KR
    - LATAM
    - AF
    - MENA
  
  format:
    - news
    - paper
    - patent
    - oss
    - std
    - vc
    - gov
    - conf
    - niche
    - nature
  
  scale:
    - macro
    - meso
    - micro

  # 가능한 셀 총수: 5 × 8 × 10 × 3 = 1,200
  # 카탈로그 80개 → 최소 80/1200 = 6.7% 커버
  # 목표: 셀당 평균 1개 미만이지만 주요 셀은 반드시 1개 이상
  
  required_coverage:
    geographic: "8개 모두 ≥ 1개 채널"
    format: "10개 중 ≥ 8개"
    temporal: "5개 모두 ≥ 1개"
    scale: "3개 모두 ≥ 1개"
