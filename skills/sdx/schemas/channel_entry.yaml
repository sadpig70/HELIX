# SDX Channel Entry Schema v1.0
#
# 각 채널은 이 스키마를 따른다.
# 카탈로그는 80개 엔트리로 구성된 YAML 리스트.

schema_definition:
  required_fields:
    - id              # CH-NNNN (고유 식별자)
    - name            # 표시명 (원어 + 영문 병기)
    - url_pattern     # 접근 URL 또는 URL 패턴
    - axis            # 4-Axis 셀 좌표
    - metrics         # 8축 평가 점수
    - total_score     # 가중 평균 (independence × 2)
    - discovery_strategy  # S1~S5
    - language        # ISO 언어 코드 리스트
    - url_alive       # bool
    - validated_at    # ISO date

  optional_fields:
    - access_cost     # 무료 / 가입 / 유료 / 기관계약
    - language_alt    # 영문 mirror 존재 여부
    - notes           # 자유 메모
    - unique_yield_example  # 이 채널에서만 나온 인사이트 예
    - dependency      # 다른 채널이 이 채널을 인용하는가
    # ---- v1.3: 노화·드리프트 추적 (decay_guide 참조) ----
    - first_seen_round     # 카탈로그 최초 등재 라운드 (freshness anchor 폴백)
    - last_yield_round     # 이 채널이 채택 인사이트에 기여한 마지막 라운드
    - yield_count          # 누적 realized-yield 횟수
    - freshness            # AI_score_channel_freshness 산출 (0-10, 라운드마다 갱신)
    - orthogonality_drift  # 카탈로그 대비 max pairwise overlap (DriftGuard 갱신)

