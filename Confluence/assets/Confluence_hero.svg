<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 400" width="920" height="400" role="img" aria-label="Confluence — one generative engine across many domains">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="core" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#334155"/>
      <stop offset="1" stop-color="#0f172a"/>
    </radialGradient>
    <style>
      .t { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
      .mono { font-family: 'Consolas','SF Mono','Menlo',monospace; }
    </style>
  </defs>

  <rect width="920" height="400" rx="18" fill="url(#bg)"/>
  <rect x="1" y="1" width="918" height="398" rx="17" fill="none" stroke="#1f2937" stroke-width="2"/>

  <text x="44" y="60" class="t" font-size="38" font-weight="700" fill="#f8fafc">Confluence</text>
  <text x="46" y="88" class="t" font-size="15" fill="#94a3b8">One generative engine · science and art meet in one design space</text>

  <!-- central engine -->
  <g>
    <circle cx="200" cy="240" r="70" fill="url(#core)" stroke="#475569" stroke-width="2"/>
    <text x="200" y="232" class="t" font-size="15" font-weight="700" fill="#e2e8f0" text-anchor="middle">ENGINE</text>
    <text x="200" y="252" class="mono" font-size="10" fill="#94a3b8" text-anchor="middle">primitives ×</text>
    <text x="200" y="266" class="mono" font-size="10" fill="#94a3b8" text-anchor="middle">constraints ×</text>
    <text x="200" y="280" class="mono" font-size="10" fill="#94a3b8" text-anchor="middle">objectives</text>
  </g>
  <text x="200" y="150" class="t" font-size="12" fill="#64748b" text-anchor="middle">deterministic Pareto search</text>

  <!-- domain chips radiating -->
  <g class="t" font-size="13" font-weight="600" text-anchor="middle">
    <!-- science (cyan) -->
    <g>
      <line x1="268" y1="212" x2="430" y2="150" stroke="#38bdf8" stroke-width="1.5" opacity="0.6"/>
      <rect x="430" y="132" width="180" height="34" rx="17" fill="#082f3a" stroke="#38bdf8" stroke-width="1.5"/>
      <text x="520" y="154" fill="#7dd3fc">molecule · pharma</text>
    </g>
    <g>
      <line x1="270" y1="224" x2="430" y2="182" stroke="#38bdf8" stroke-width="1.5" opacity="0.6"/>
      <rect x="430" y="176" width="180" height="34" rx="17" fill="#082f3a" stroke="#38bdf8" stroke-width="1.5"/>
      <text x="520" y="198" fill="#7dd3fc">alloy · materials</text>
    </g>
    <g>
      <line x1="270" y1="240" x2="430" y2="226" stroke="#38bdf8" stroke-width="1.5" opacity="0.6"/>
      <rect x="430" y="220" width="180" height="34" rx="17" fill="#082f3a" stroke="#38bdf8" stroke-width="1.5"/>
      <text x="520" y="242" fill="#7dd3fc">floorplan · chips</text>
    </g>
    <g>
      <line x1="270" y1="256" x2="430" y2="270" stroke="#38bdf8" stroke-width="1.5" opacity="0.6"/>
      <rect x="430" y="264" width="180" height="34" rx="17" fill="#082f3a" stroke="#38bdf8" stroke-width="1.5"/>
      <text x="520" y="286" fill="#7dd3fc">energy · schema</text>
    </g>
    <!-- arts (amber) -->
    <g>
      <line x1="640" y1="149" x2="700" y2="149" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
      <rect x="700" y="132" width="176" height="34" rx="17" fill="#3a2606" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="788" y="154" fill="#fcd34d">mandala · SVG</text>
    </g>
    <g>
      <line x1="640" y1="193" x2="700" y2="193" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
      <rect x="700" y="176" width="176" height="34" rx="17" fill="#3a2606" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="788" y="198" fill="#fcd34d">melody · WAV</text>
    </g>
    <g>
      <line x1="640" y1="237" x2="700" y2="237" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
      <rect x="700" y="220" width="176" height="34" rx="17" fill="#3a2606" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="788" y="242" fill="#fcd34d">story · text</text>
    </g>
  </g>

  <text x="44" y="376" class="mono" font-size="12" fill="#64748b">deterministic · stdlib-only · multi-objective Pareto · illustrative domain packs</text>
</svg>
