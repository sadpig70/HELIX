<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" width="880" height="380" role="img" aria-label="ConcordGate — reconcile independent attestations">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="gate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
    <style>
      .t   { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
      .title { font-weight: 700; }
      .mono { font-family: 'SF Mono', 'Consolas', 'Menlo', monospace; }
    </style>
  </defs>

  <rect x="0" y="0" width="880" height="380" rx="18" fill="url(#bg)"/>
  <rect x="1" y="1" width="878" height="378" rx="17" fill="none" stroke="#1f2937" stroke-width="2"/>

  <!-- header -->
  <text x="44" y="66" class="t title" font-size="38" fill="#f8fafc">ConcordGate</text>
  <text x="46" y="96" class="t" font-size="16" fill="#94a3b8">Reconcile independent attestations about one subject</text>

  <!-- source nodes -->
  <g class="t" font-size="13" fill="#e2e8f0" text-anchor="middle">
    <circle cx="150" cy="180" r="30" fill="#0b1220" stroke="#38bdf8" stroke-width="2"/>
    <text x="150" y="184">AuditCo</text>
    <circle cx="150" cy="252" r="30" fill="#0b1220" stroke="#38bdf8" stroke-width="2"/>
    <text x="150" y="256">ReproLab</text>
    <circle cx="150" cy="324" r="30" fill="#0b1220" stroke="#f59e0b" stroke-width="2"/>
    <text x="150" y="328">ThirdEye</text>
  </g>
  <text x="150" y="140" class="t" font-size="12" fill="#64748b" text-anchor="middle">independent sources (org)</text>

  <!-- edges to gate -->
  <g fill="none" stroke-width="2">
    <path d="M180 180 C 260 180, 300 235, 356 250" stroke="#38bdf8" opacity="0.8"/>
    <path d="M180 252 C 260 252, 300 250, 356 252" stroke="#38bdf8" opacity="0.8"/>
    <path d="M180 324 C 260 324, 300 268, 356 258" stroke="#f59e0b" opacity="0.8" stroke-dasharray="5 4"/>
  </g>

  <!-- gate (hexagon) -->
  <g>
    <polygon points="356,205 420,175 484,205 484,300 420,330 356,300"
             fill="url(#gate)" stroke="#475569" stroke-width="2"/>
    <text x="420" y="245" class="t title" font-size="16" fill="#e2e8f0" text-anchor="middle">GATE</text>
    <text x="420" y="268" class="mono" font-size="11" fill="#94a3b8" text-anchor="middle">quorum · concord?</text>
  </g>

  <!-- edge to verdicts -->
  <path d="M484 252 C 540 252, 560 252, 596 252" fill="none" stroke="#475569" stroke-width="2"/>

  <!-- verdict pills -->
  <g class="t" font-size="14" font-weight="700" text-anchor="middle">
    <rect x="600" y="168" width="232" height="40" rx="20" fill="#052e1a" stroke="#22c55e" stroke-width="2"/>
    <text x="716" y="193" fill="#4ade80">CONCORDANT</text>
    <rect x="600" y="232" width="232" height="40" rx="20" fill="#3b0d0d" stroke="#ef4444" stroke-width="2"/>
    <text x="716" y="257" fill="#f87171">SPLIT</text>
    <rect x="600" y="296" width="232" height="40" rx="20" fill="#1f2530" stroke="#64748b" stroke-width="2"/>
    <text x="716" y="321" fill="#cbd5e1">INSUFFICIENT</text>
  </g>

  <!-- footer -->
  <text x="44" y="356" class="mono" font-size="12" fill="#64748b">deterministic · stdlib-only · sealed hash-chain ledger · fail-closed</text>
</svg>
