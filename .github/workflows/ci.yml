name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # ActionHandbackVerifier is an independent repo and HELIX's reference
      # exploit project (handback gate). Vendor it as a subdir so the
      # integration tests + validate run against the real implementation.
      - name: Vendor reference project (ActionHandbackVerifier)
        uses: actions/checkout@v4
        with:
          repository: sadpig70/ActionHandbackVerifier
          path: ActionHandbackVerifier
      - name: Vendor Attestra platform
        uses: actions/checkout@v4
        with:
          repository: sadpig70/Attestra
          path: Attestra
      - name: Vendor Clearstra platform
        uses: actions/checkout@v4
        with:
          repository: sadpig70/Clearstra
          path: Clearstra
      - name: Vendor Routestra platform
        uses: actions/checkout@v4
        with:
          repository: sadpig70/Routestra
          path: Routestra
      - name: Vendor Certstra platform
        uses: actions/checkout@v4
        with:
          repository: sadpig70/Certstra
          path: Certstra
      - name: Vendor Scorestra platform
        uses: actions/checkout@v4
        with:
          repository: sadpig70/Scorestra
          path: Scorestra
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Unit tests
        run: python -m unittest discover -s tests -q
      - name: Validate (structure + determinism)
        run: python core/helix_validate.py .
