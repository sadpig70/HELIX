name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # ActionHandbackVerifier is an independent repo and HELIX's reference
      # exploit project (handback gate). Vendor it as a subdir so the
      # integration tests + validate run against the real implementation.
      - name: Vendor reference project (ActionHandbackVerifier)
        uses: actions/checkout@v7
        with:
          repository: sadpig70/ActionHandbackVerifier
          path: ActionHandbackVerifier
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Unit tests
        run: python -W error::ResourceWarning -m unittest discover -s tests -q
      - name: Validate (structure + determinism)
        run: python core/helix_validate.py .
      - name: Validate corpus supply plane
        run: |
          python helix.py corpus verify-ledger --root seed/corpus
          python helix.py corpus health --root seed/corpus
      - name: Ensure tests leave working tree clean
        run: |
          status="$(git status --short)"
          if [ -n "$status" ]; then
            echo "$status"
            exit 1
          fi
